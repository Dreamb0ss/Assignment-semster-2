<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Petrol Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Petrol Calculator</h1>

    <!-- Price input -->
    <input type="number" id="price" value="1.72" step="0.01" placeholder="Price per litre">

    <!-- Litres input -->
    <input type="number" id="litres" value="0" step="0.01" placeholder="Litres">

    <!-- Button -->
    <button id="calcBtn">Calculate</button>

    <!-- Result -->
    <p id="result">Total: £0.00</p>

  </div>

  <script src="index.js"></script>
</body>
</html>
