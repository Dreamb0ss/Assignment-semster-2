<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Three Images - Nature Theme</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Beautiful Nature Gallery</h1>
    <p>Theme: Peaceful nature landscapes</p>
  </header>

  <main class="gallery">

    <div class="card">
      <img src="https://images.pexels.com/photos/240040/pexels-photo-240040.jpeg"
           alt="Green forest with tall trees"
           title="Peaceful Forest"
           width="300"
           height="200">
      <h2>Forest</h2>
      <p>License: Free to use for commercial projects.</p>
    </div>

    <div class="card">
      <img src="https://images.pexels.com/photos/31215259/pexels-photo-31215259.jpeg"
           alt="Mountain landscape with sky"
           title="Mountain View"
           width="300"
           height="200">
      <h2>Mountain</h2>
      <p>License: Free to use for commercial projects.</p>
    </div>

    <div class="card">
      <img src="https://images.pexels.com/photos/27547765/pexels-photo-27547765.jpeg"
           alt="Calm beach with ocean water"
           title="Sunny Beach"
           width="300"
           height="200">
      <h2>Beach</h2>
      <p>License: Free to use for commercial projects.</p>
    </div>

  </main>

</body>
</html>
